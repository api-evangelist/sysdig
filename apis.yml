  - aid: sysdig:sysdig-secure
    name: Sysdig Secure
    description: >-
      The Sysdig Secure API provides programmatic access to cloud and container
      security capabilities including vulnerability management, runtime policies,
      compliance checks, activity audit, incident response, image scanning,
      SBOM retrieval, and Falco rules management.
