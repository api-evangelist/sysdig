aid: sysdig
name: Sysdig
description: >-
  Sysdig is a cloud and container security platform that provides runtime threat
  detection, vulnerability management, cloud security posture management (CSPM),
  compliance automation, and observability for containers, Kubernetes, and cloud
  environments. Sysdig Monitor offers full-stack monitoring and alerting while
  Sysdig Secure delivers runtime security, vulnerability scanning, policy
  enforcement, incident response, and compliance reporting.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Cloud Security
  - Containers
  - Kubernetes
  - Runtime Security
  - Security
  - Vulnerability Management
  - Monitoring
  - Observability
  - CSPM
  - Compliance
