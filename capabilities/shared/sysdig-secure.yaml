naftiko: "1.0.0-alpha1"

info:
  label: "Sysdig Secure"
  description: >-
    Sysdig Secure API for managing cloud and container security including
    vulnerability management, runtime policies, Falco rules, compliance,
    activity audit, image scanning, and SBOM management.
  tags:
    - Sysdig
    - Security
    - Vulnerability Management
    - Compliance
    - Runtime Security
    - Falco
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYSDIG_API_TOKEN: SYSDIG_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: sysdig-secure
      baseUri: https://api.us1.sysdig.com
      description: "Sysdig Secure REST API for cloud and container security."
      authentication:
        type: bearer
        token: "{{SYSDIG_API_TOKEN}}"
      resources:
        - name: vulnerabilities
          path: /api/scanning/v1/resultsDirect
          description: "Vulnerability scanning results"
          operations:
            - name: list-vulnerability-results
              method: GET
              description: "List vulnerability scanning results"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "Filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: image-vulnerabilities
          path: /api/scanning/v1/images/{imageId}/vulnDirect
          description: "Image-specific vulnerabilities"
          operations:
            - name: get-image-vulnerabilities
              method: GET
              description: "Get vulnerabilities for a specific image"
              inputParameters:
                - name: imageId
                  in: path
                  type: string
                  required: true
                  description: "Container image identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: image-sbom
          path: /api/scanning/v1/images/{imageId}/sbom
          description: "Image SBOM"
          operations:
            - name: get-image-sbom
              method: GET
              description: "Get SBOM for a container image"
              inputParameters:
                - name: imageId
                  in: path
                  type: string
                  required: true
                  description: "Container image identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: policies
          path: /api/policies/v2
          description: "Runtime security policies"
          operations:
            - name: list-policies
              method: GET
              description: "List all runtime security policies"
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Policy type filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-policy
              method: POST
              description: "Create a new runtime security policy"
              body:
                type: json
                data:
                  policy: "{{tools.policy}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: policy-by-id
          path: /api/policies/v2/{policyId}
          description: "Manage a specific policy"
          operations:
            - name: get-policy
              method: GET
              description: "Get a specific runtime policy"
              inputParameters:
                - name: policyId
                  in: path
                  type: integer
                  required: true
                  description: "Policy unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-policy
              method: PUT
              description: "Update a runtime security policy"
              inputParameters:
                - name: policyId
                  in: path
                  type: integer
                  required: true
                  description: "Policy unique identifier"
              body:
                type: json
                data:
                  policy: "{{tools.policy}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-policy
              method: DELETE
              description: "Delete a runtime security policy"
              inputParameters:
                - name: policyId
                  in: path
                  type: integer
                  required: true
                  description: "Policy unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: falco-rules
          path: /api/secure/falco/v2/rules
          description: "Falco security rules"
          operations:
            - name: list-falco-rules
              method: GET
              description: "List all Falco rules"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-falco-rule
              method: POST
              description: "Create a custom Falco rule"
              body:
                type: json
                data:
                  rule: "{{tools.rule}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: compliance-tasks
          path: /api/compliance/v2/tasks
          description: "Compliance evaluation tasks"
          operations:
            - name: list-compliance-tasks
              method: GET
              description: "List all compliance tasks"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: compliance-results
          path: /api/compliance/v2/tasks/{taskId}/results
          description: "Compliance check results"
          operations:
            - name: get-compliance-results
              method: GET
              description: "Get compliance results for a task"
              inputParameters:
                - name: taskId
                  in: path
                  type: string
                  required: true
                  description: "Compliance task identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: secure-events
          path: /api/v1/secureEvents
          description: "Runtime security events"
          operations:
            - name: list-secure-events
              method: GET
              description: "List runtime security events"
              inputParameters:
                - name: from
                  in: query
                  type: integer
                  required: false
                  description: "Start time (Unix epoch seconds)"
                - name: to
                  in: query
                  type: integer
                  required: false
                  description: "End time (Unix epoch seconds)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "Filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: activity-audit
          path: /api/v1/activityAudit
          description: "Activity audit trail"
          operations:
            - name: list-activity-audit
              method: GET
              description: "List activity audit entries"
              inputParameters:
                - name: from
                  in: query
                  type: integer
                  required: false
                  description: "Start time"
                - name: to
                  in: query
                  type: integer
                  required: false
                  description: "End time"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: image-scan
          path: /api/scanning/v1/image
          description: "Trigger image scanning"
          operations:
            - name: scan-image
              method: POST
              description: "Trigger vulnerability scan for a container image"
              body:
                type: json
                data:
                  tag: "{{tools.tag}}"
                  digest: "{{tools.digest}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: scanned-images
          path: /api/scanning/v1/images
          description: "Scanned images inventory"
          operations:
            - name: list-scanned-images
              method: GET
              description: "List all scanned container images"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: sysdig-secure-api
      resources:
        - path: /v1/vulnerabilities
          name: vulnerabilities
          description: "Vulnerability scanning results"
          operations:
            - method: GET
              name: list-vulnerability-results
              description: "List vulnerability results"
              call: "sysdig-secure.list-vulnerability-results"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/policies
          name: policies
          description: "Runtime security policies"
          operations:
            - method: GET
              name: list-policies
              description: "List runtime security policies"
              call: "sysdig-secure.list-policies"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/events
          name: secure-events
          description: "Runtime security events"
          operations:
            - method: GET
              name: list-secure-events
              description: "List security events"
              call: "sysdig-secure.list-secure-events"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: sysdig-secure-mcp
      transport: http
      tools:
        - name: list-vulnerability-results
          description: "List vulnerability scanning results"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-secure.list-vulnerability-results"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-image-vulnerabilities
          description: "Get vulnerabilities for a specific container image"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-secure.get-image-vulnerabilities"
          with:
            imageId: "tools.imageId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-policies
          description: "List all runtime security policies"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-secure.list-policies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-secure-events
          description: "List runtime security events"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-secure.list-secure-events"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-compliance-tasks
          description: "List compliance evaluation tasks"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-secure.list-compliance-tasks"
          outputParameters:
            - type: object
              mapping: "$."
