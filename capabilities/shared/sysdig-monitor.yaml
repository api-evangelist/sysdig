naftiko: "1.0.0-alpha1"

info:
  label: "Sysdig Monitor"
  description: >-
    Sysdig Monitor API for managing monitoring dashboards, alerts, events,
    metrics, notification channels, and teams in cloud-native environments.
  tags:
    - Sysdig
    - Monitoring
    - Observability
    - Alerts
    - Dashboards
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYSDIG_API_TOKEN: SYSDIG_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: sysdig-monitor
      baseUri: https://api.us1.sysdig.com
      description: "Sysdig Monitor REST API for observability and alerting."
      authentication:
        type: bearer
        token: "{{SYSDIG_API_TOKEN}}"
      resources:
        - name: alerts
          path: /api/v2/alerts
          description: "Manage monitoring alerts"
          operations:
            - name: list-alerts
              method: GET
              description: "Retrieve all monitoring alerts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-alert
              method: POST
              description: "Create a new monitoring alert"
              body:
                type: json
                data:
                  alert: "{{tools.alert}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alert-by-id
          path: /api/v2/alerts/{alertId}
          description: "Manage a specific alert"
          operations:
            - name: get-alert
              method: GET
              description: "Retrieve a specific alert by ID"
              inputParameters:
                - name: alertId
                  in: path
                  type: integer
                  required: true
                  description: "Alert unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-alert
              method: PUT
              description: "Update an existing monitoring alert"
              inputParameters:
                - name: alertId
                  in: path
                  type: integer
                  required: true
                  description: "Alert unique identifier"
              body:
                type: json
                data:
                  alert: "{{tools.alert}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-alert
              method: DELETE
              description: "Delete a monitoring alert"
              inputParameters:
                - name: alertId
                  in: path
                  type: integer
                  required: true
                  description: "Alert unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dashboards
          path: /api/v3/dashboards
          description: "Manage monitoring dashboards"
          operations:
            - name: list-dashboards
              method: GET
              description: "Retrieve all monitoring dashboards"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-dashboard
              method: POST
              description: "Create a new monitoring dashboard"
              body:
                type: json
                data:
                  dashboard: "{{tools.dashboard}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dashboard-by-id
          path: /api/v3/dashboards/{dashboardId}
          description: "Manage a specific dashboard"
          operations:
            - name: get-dashboard
              method: GET
              description: "Retrieve a specific dashboard by ID"
              inputParameters:
                - name: dashboardId
                  in: path
                  type: integer
                  required: true
                  description: "Dashboard unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-dashboard
              method: PUT
              description: "Update an existing dashboard"
              inputParameters:
                - name: dashboardId
                  in: path
                  type: integer
                  required: true
                  description: "Dashboard unique identifier"
              body:
                type: json
                data:
                  dashboard: "{{tools.dashboard}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-dashboard
              method: DELETE
              description: "Delete a dashboard"
              inputParameters:
                - name: dashboardId
                  in: path
                  type: integer
                  required: true
                  description: "Dashboard unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events
          path: /api/v2/events
          description: "Manage monitoring events"
          operations:
            - name: list-events
              method: GET
              description: "Retrieve monitoring events"
              inputParameters:
                - name: from
                  in: query
                  type: integer
                  required: false
                  description: "Start time (Unix epoch microseconds)"
                - name: to
                  in: query
                  type: integer
                  required: false
                  description: "End time (Unix epoch microseconds)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-event
              method: POST
              description: "Create a custom event"
              body:
                type: json
                data:
                  event: "{{tools.event}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: notification-channels
          path: /api/notificationChannels
          description: "Manage alert notification channels"
          operations:
            - name: list-notification-channels
              method: GET
              description: "Retrieve all notification channels"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-notification-channel
              method: POST
              description: "Create a new notification channel"
              body:
                type: json
                data:
                  notificationChannel: "{{tools.notificationChannel}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /api/v2/teams
          description: "Manage Sysdig teams"
          operations:
            - name: list-teams
              method: GET
              description: "Retrieve all teams"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-team
              method: POST
              description: "Create a new team"
              body:
                type: json
                data:
                  team: "{{tools.team}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: metrics-find
          path: /api/v2/metrics/find
          description: "Search available metrics"
          operations:
            - name: find-metrics
              method: GET
              description: "Search for metrics by name pattern"
              inputParameters:
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Metric name pattern"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sysdig-monitor-api
      resources:
        - path: /v1/alerts
          name: alerts
          description: "Manage monitoring alerts"
          operations:
            - method: GET
              name: list-alerts
              description: "List all monitoring alerts"
              call: "sysdig-monitor.list-alerts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-alert
              description: "Create a new monitoring alert"
              call: "sysdig-monitor.create-alert"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dashboards
          name: dashboards
          description: "Manage dashboards"
          operations:
            - method: GET
              name: list-dashboards
              description: "List all dashboards"
              call: "sysdig-monitor.list-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/events
          name: events
          description: "Manage events"
          operations:
            - method: GET
              name: list-events
              description: "List monitoring events"
              call: "sysdig-monitor.list-events"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/teams
          name: teams
          description: "Manage teams"
          operations:
            - method: GET
              name: list-teams
              description: "List all teams"
              call: "sysdig-monitor.list-teams"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sysdig-monitor-mcp
      transport: http
      tools:
        - name: list-alerts
          description: "List all Sysdig Monitor alerts"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-monitor.list-alerts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-alert
          description: "Get a specific Sysdig Monitor alert by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-monitor.get-alert"
          with:
            alertId: "tools.alertId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-dashboards
          description: "List all Sysdig Monitor dashboards"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-monitor.list-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-events
          description: "List Sysdig Monitor events"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-monitor.list-events"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-teams
          description: "List all Sysdig teams"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-monitor.list-teams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: find-metrics
          description: "Search for available Sysdig metrics"
          hints:
            readOnly: true
            openWorld: true
          call: "sysdig-monitor.find-metrics"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
